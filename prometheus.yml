global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'kvstore'
    metrics_path: /metrics-prom
    static_configs:
      - targets:
          - 'host.docker.internal:8000'
          - 'host.docker.internal:8001'
          - 'host.docker.internal:8002'
        labels:
          group: 'kvstore-cluster'